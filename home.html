<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevi Meteo previsioni Meteo e molto altro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="stile_sito.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="weather-bg">
    <nav class="menu">
    <div class="div-menu">
       <a  class="logo-menu">
            <i class="fas fa-cloud-sun"></i>Trevi Meteo
        </a>
        <ul class="pagine-menu">
            <li><a class="attiva"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="radar.html"><i class="fas fa-map-marked-alt"></i>Radar</a></li>
            <li><a href="mappa.html"><i class="fas fa-tint"></i>Oggi com'è il mare?</a></li>
            <li><a href="allerta.html"><i class="fas fa-exclamation-triangle"></i> Allerte</a></li>
        </ul>
    </div>
</nav>
    <div id="rainLayer" class="rain-overlay" style="display: none;"></div><div class="container">
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Cerca una città..." class="search-input">
            <button id="searchBtn" class="search-button"><i class="fas fa-search"></i></button>
        </div>
        <div class="weather-card">
            <div class="main-info">
                <div class="text-group">
                    <h1 id="cityName"></h1>
                    <p id="currentDate" class="dateStyle" ></p>
                    <div class="temp-display">
                        <span id="temp"></span>
                        <p id="description"></p>
                    </div>
                </div>
                <div class="icon-group">
                    <i id="weatherIcon" class="fas fa-sun"></i>
                </div>
            </div>
            <div class="details-grid">
                <div class="detail-item">
                    <p>Umidità</p>
                    <span id="humidity"></span>
                </div>
                <div class="detail-item">
                    <p>Vento</p>
                    <span id="wind"></span>
                </div>
                <div class="detail-item">
                    <p>Pressione</p>
                    <span id="pressure"></span>
                </div>
                <div class="detail-item">
                    <p>Percepita</p>
                    <span id="feelsLike"></span>
                </div>
            </div>
        </div>
        <div class="previsioni">
            <h3 class="titolo-previsioni">Previsioni prossime 24 ore</h3>
            <div id="SliderOrario" class="slider"></div>
        </div>
    </div>
    <script src="home.js"></script>
</body>
</html>
